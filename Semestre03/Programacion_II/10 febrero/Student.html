<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Programacion 2</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="prueba.html">Ir a pruebas</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <h1>Gestión de Estudiantes</h1>

    <div class="row g-3 mb-4 align-items-end">
        <div class="col-md-3">
            <label class="form-label">Nombre:</label>
            <input type="text" id="nombre" class="form-control">
        </div>
        <div class="col-md-2">
            <label class="form-label">Edad:</label>
            <input type="number" id="edad" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">Promedio:</label>
            <input type="text" id="promedio" class="form-control">
        </div>
        <div class="col-md-4">
            <button onclick="agregarEstudiante()" class="btn btn-success">Agregar</button>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Promedio</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
            </tbody>
    </table>
     <div>
        <canvas id="myChart"></canvas>
     </div>
     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const URL_BASE = "http://127.0.0.1:5000";

        async function obtenerInfo() {
            nombres = []
            edades = []
            try {
                const respuesta = await fetch(`${URL_BASE}/listarEstudiantes`);
                const datos = await respuesta.json();
                nombres = datos.map(estudiante => estudiante.nombre);
                edades = datos.map(estudiante => estudiante.edad);
                const cuerpoTabla = document.getElementById("cuerpo-tabla");
                cuerpoTabla.innerHTML = "";

                datos.forEach(estudiante => {
                    const fila = document.createElement("tr");
                    // Usamos JSON.stringify para pasar el objeto completo al botón de actualizar
                    fila.innerHTML = `
                        <td>${estudiante.nombre}</td>
                        <td>${estudiante.edad}</td>
                        <td>${estudiante.promedio}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" style="margin-left:5 px" onclick='prepararActualizar(${JSON.stringify(estudiante)})'>Editar</button>
                            <button class="btn btn-sm btn-danger" onclick="borrarEstudiante('${estudiante.id}')">Borrar</button>
                        </td>
                    `;
                    cuerpoTabla.appendChild(fila);
                });
            } catch (error) {
                console.error("Error al obtener datos:", error);
            }
            const ctx = document.getElementById("myChart");
             new Chart(ctx, {
            type: 'bar',
            data: {
            labels: nombres,
            datasets: [{
                label: 'Edades de los estudiantes',
                data: edades,
                borderWidth: 1
            }]
            },
            options: {
            scales: {
                y: {
                beginAtZero: true
                }
            }
            }
        });

        }

       
        async function agregarEstudiante() {
            const estudiante = {
                nombre: document.getElementById("nombre").value,
                edad: document.getElementById("edad").value,
                promedio: document.getElementById("promedio").value
            };

            await fetch(`${URL_BASE}/crearEstudiante`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(estudiante)
            });
            
            obtenerInfo(); // Refrescar tabla
            limpiarFormulario();
        }

        async function borrarEstudiante(id) {
            if (confirm("¿Estás seguro de eliminar este estudiante?")) {
                await fetch(`${URL_BASE}/eliminarEstudiante/${id}`, {
                    method: "DELETE"
                });
                obtenerInfo();
            }
        }

        function prepararActualizar(estudiante) {
            // Carga los datos de la fila en los inputs para editarlos
            document.getElementById("nombre").value = estudiante.nombre;
            document.getElementById("edad").value = estudiante.edad;
            document.getElementById("promedio").value = estudiante.promedio;
            
            // Aquí podrías cambiar el botón "Agregar" por uno de "Guardar Cambios"
            alert("Datos cargados en el formulario para editar.");
        }

        function limpiarFormulario() {
            document.getElementById("nombre").value = "";
            document.getElementById("edad").value = "";
            document.getElementById("promedio").value = "";
        }

        document.addEventListener('DOMContentLoaded', obtenerInfo);
    </script>
</body>
</html>
