<h1>
  <small>Crea un estudiante</small>
</h1>
<hr class="mb-2" />

<div class="grid">
  <div class="col-12 md:col-6"> <div class="card">
      <div class="card-content">

        <form [formGroup]="estudianteForm" (ngSubmit)="onSubmit()">

          <div class="form-group mb-3">
            <label for="id">ID</label>
            <input
              id="id"
              type="number"
              class="form-control"
              formControlName="id"
            />
          </div>

          <div class="form-group mb-3">
            <label for="nombre">Nombre</label>
            <input
              id="nombre"
              type="text"
              class="form-control"
              formControlName="nombre"
              placeholder="Ej. Juan Pérez"
            />
          </div>

          <div class="form-group mb-3">
            <label for="edad">Edad</label>
            <input
              id="edad"
              type="number"
              class="form-control"
              formControlName="edad"
            />
          </div>

          <div class="form-group mb-3">
            <label for="genero">Género</label>
            <input
              id="genero"
              type="text"
              class="form-control"
              formControlName="genero"
              placeholder="Masculino/Femenino/Otro"
            />
          </div>

          <div class="flex justify-content-end mt-4">
            <button
              type="submit"
              class="btn-primary"
              [disabled]="estudianteForm.invalid">
              Enviar
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>
